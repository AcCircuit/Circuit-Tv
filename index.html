<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e50914; /* Robiul IPTV এর মতো লাল থিম */
            --bg-color: #0b0c10;
            --card-bg: #14161d;
            --border-color: #222632;
            --text-muted: #8e94a5;
        }
        
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* Top Sticky Video Player Design */
        .player-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            max-height: 230px;
            display: block;
            aspect-ratio: 16/9;
        }

        /* App Branding Header */
        .app-header {
            background: #10121a;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-brand span {
            color: var(--primary-color);
        }
        .live-badge {
            background: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            animation: blink 1.5s infinite;
        }

        /* Categories Horizontal Scroll Layout */
        .category-container {
            background: #10121a;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .category-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 15px;
            gap: 10px;
        }
        .category-scroll::-webkit-scrollbar {
            display: none; /* হাইড স্ক্রলবার */
        }
        .category-btn {
            background: #1c1f2b;
            color: #b5b9c4;
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
        }

        /* Channels Dynamic Grid Layout */
        .channel-list {
            padding: 15px;
        }
        .channel-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .channel-card:active {
            transform: scale(0.97);
            background: #1b1e28;
        }
        .channel-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1f2331, #13151f);
            border: 1px solid #2d3244;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            margin-right: 15px;
            text-align: center;
            flex-shrink: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .channel-info {
            flex-grow: 1;
        }
        .channel-info h5 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #f1f2f6;
        }
        .channel-info p {
            margin: 2px 0 0 0;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .play-icon-btn {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .channel-card:hover .play-icon-btn {
            color: var(--primary-color);
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>

        // ২. স্ক্রিনে চ্যানেল রেন্ডার করার ফাংশন
        function displayChannels(filter) {
            if (!container) return;
            container.innerHTML = "";
            
            channels.forEach((channel, index) => {
                if (filter === 'All' || channel.category === filter) {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.setAttribute('onclick', `playM3U8("${channel.url}")`);

                    card.innerHTML = `
                        <div class="channel-logo">${channel.logo}</div>
                        <div class="channel-info">
                            <h5>${channel.name}</h5>
                            <p>${channel.category} Channel</p>
                        </div>
                        <div class="play-icon-btn">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // ৩. ক্যাটাগরি ফিল্টারিং ফাংশন
        function filterCategory(categoryName) {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (window.event && window.event.target) {
                window.event.target.classList.add('active');
            } else {
                //Fallback for manual trigger
                event.target.classList.add('active');
            }
            displayChannels(categoryName);
        }

        // ৪. মেগা পাওয়ারফুল M3U8 প্লেয়ার লজিক
        function playM3U8(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { 
                    video.play().catch(e => console.log("Autoplay Auto Blocked")); 
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        // অ্যাপ চালু হলেই অল চ্যানেল রেন্ডার হবে
        window.onload = function() {
            displayChannels('All');
        };
