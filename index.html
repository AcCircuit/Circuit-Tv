    <style>
        :root {
            --primary-color: #ff003c; /* Neon Red Premium Accent */
            --bg-color: #0d0f14;
            --card-bg: #161922;
            --border-color: #242936;
            --text-muted: #8e94a5;
        }
        
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* Top Sticky Video Player Design */
        .player-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #000;
            box-shadow: 0 4px 25px rgba(0,0,0,0.7);
        }
        video {
            width: 100%;
            max-height: 230px;
            display: block;
            aspect-ratio: 16/9;
        }

        /* App Branding Header */
        .app-header {
            background: #11141d;
            padding: 14px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-brand {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-brand span {
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.6);
        }
        .live-badge {
            background: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 4px 9px;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 0 8px var(--primary-color);
            animation: blink 1.5s infinite;
        }

        /* Categories Horizontal Scroll Layout */
        .category-container {
            background: #11141d;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .category-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 15px;
            gap: 10px;
        }
        .category-scroll::-webkit-scrollbar {
            display: none; 
        }
        .category-btn {
            background: #1c202e;
            color: #b5b9c4;
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 12px rgba(255, 0, 60, 0.4);
        }

        /* Channels Dynamic Grid Layout */
        .channel-list {
            padding: 15px;
        }
        .channel-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .channel-card:active {
            transform: scale(0.97);
            background: #202433;
        }
        .channel-logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #222738, #141722);
            border: 1px solid #32394f;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            margin-right: 15px;
            text-align: center;
            flex-shrink: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
        .channel-info {
            flex-grow: 1;
        }
        .channel-info h5 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #f1f2f6;
        }
        .channel-info p {
            margin: 4px 0 0 0;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .play-icon-btn {
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .channel-card:hover .play-icon-btn {
            color: var(--primary-color);
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        const video = document.getElementById('video');

        let currentHls = null;

        // ২. স্ক্রিনে চ্যানেল রেন্ডার করার মেগা লজিক
        function displayChannels(filter) {
            if (!container) return;
            container.innerHTML = "";
            
            channels.forEach((channel) => {
                if (filter === 'All' || channel.category === filter) {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.setAttribute('onclick', `playM3U8("${channel.url}")`);

                    card.innerHTML = `
                        <div class="channel-logo">${channel.logo}</div>
                        <div class="channel-info">
                            <h5>${channel.name}</h5>
                            <p>${channel.category} Category</p>
                        </div>
                        <div class="play-icon-btn">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // ৩. ক্যাটাগরি ফিল্টারিং ফাংশন
        function filterCategory(categoryName) {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (window.event && window.event.target) {
                window.event.target.classList.add('active');
            } else if (event && event.target) {
                event.target.classList.add('active');
            }
            displayChannels(categoryName);
        }

        // ৪. আল্ট্রা-পাওয়ারফুল এবং বাইপাস-সক্ষম প্লেয়ার লজিক
        function playM3U8(url) {
            // আগের রানিং স্ট্রিম বন্ধ করা (যাতে ক্র্যাশ না করে)
            if (currentHls) {
                currentHls.destroy();
            }

            if (Hls.isSupported()) {
                // ব্রাউজার ব্লকিং এড়াতে কাস্টম কনফিগারেশন রিলোড ইঞ্জিন
                currentHls = new Hls({
                    maxBufferLength: 30,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, function() { 
                    video.play().catch(e => {
                        // অটো-প্লে ব্লক হলে ইউজার ক্লিক বাইপাস
                        console.log("Play Triggered");
                    }); 
                });
                
                // যদি লিংকে কোনো এরর আসে তবে অটো রিস্টার্ট লজিক
                currentHls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                currentHls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                currentHls.recoverMediaError();
                                break;
                            default:
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // আইফোন/আইপ্যাড সাফারির জন্য অটো-রানিং
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        // অ্যাপ চালু হলেই সব চ্যানেল স্ক্রিনে চলে আসবে
        window.onload = function() {
            displayChannels('All');
        };
    </script>
</body>
</html>
