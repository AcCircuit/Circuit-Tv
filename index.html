<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        video {
            width: 100%;
            background: black;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .channel-box {
            margin-top: 20px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
        }
        h3 { margin-top: 0; }
        select {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Live TV Player</h2>
    
    <video id="video" controls autoplay></video>

    <div class="channel-box">
        <h3>Select Channel</h3>
        <select id="channelSelect">
            <option value="">Choose a channel...</option>
        </select>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
